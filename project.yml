name: Pits
options:
  bundleIdPrefix: net.farriswheel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.9"
    CURRENT_PROJECT_VERSION: "10"
    GENERATE_INFOPLIST_FILE: NO
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
targets:
  Pits:
    type: application
    platform: macOS
    sources:
      - path: Pits
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.farriswheel.Pits
        INFOPLIST_FILE: Pits/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Pits/Pits.entitlements
        # Local Debug builds: ad-hoc sign so the app launches without a Developer ID cert.
        # Release builds: CI passes CODE_SIGN_IDENTITY="Developer ID Application" + DEVELOPMENT_TEAM via xcodebuild flags.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
  PitsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PitsTests
        excludes:
          - "Fixtures/**/*.jsonl"
      - path: PitsTests/Fixtures
        type: folder
    dependencies:
      - target: Pits
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Pits.app/Contents/MacOS/Pits
        # Test bundle has no custom Info.plist needs — let Xcode synthesize one.
        # Overrides the project-level GENERATE_INFOPLIST_FILE: NO so the test
        # target can code-sign without an explicit Info.plist file.
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Pits:
    build:
      targets:
        Pits: all
        PitsTests: [test]
    test:
      targets:
        - PitsTests
